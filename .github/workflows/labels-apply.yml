name: Labels Apply

# Maintainer note: uses pull_request_target so fork PRs get labeled.
# Do NOT add `actions/checkout` of the PR ref in future edits — that
# would execute fork code with write access. We only read PR metadata
# via the GitHub API.

on:
  pull_request_target:
    types: [opened, synchronize, edited, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to label
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  apply:
    name: Apply labels to PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Apply labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: ./scripts/apply-labels.sh

name: Main

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run checks
        run: make check
